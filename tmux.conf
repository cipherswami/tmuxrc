###################################################
# @file   : tmux.conf
# @brief  : Config file for tmux.
###################################################

# -------------------------------------------------------------------
# General
# -------------------------------------------------------------------

# Use tmux's terminfo entry.
set -g default-terminal "tmux-256color"

# Enable true-color (24-bit RGB).
set -ga terminal-overrides ",*:RGB"

# Place the status bar at the top.
set -g status-position top

# Sync with the system clipboard.
set -g set-clipboard on

# Enable mouse support.
set -g mouse on

# Refresh the status line every 5 seconds.
set -g status-interval 5

# Remove the Escape key delay.
set -sg escape-time 0

# Forward terminal focus events.
set -g focus-events on

# Enable extended keyboard support.
set -g extended-keys on

# Start window numbering at 1.
set -g base-index 1

# Start pane numbering at 1.
set -wg pane-base-index 1

# Renumber windows after closing.
set -g renumber-windows on

# Resize windows to match the active client.
set -g aggressive-resize on

# Disable the terminal bell.
set -g bell-action none

# Reload the configuration.
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Configuration reloaded"

# Toggle synchronized panes.
bind y setw synchronize-panes \; display-message "Sync: #{?synchronize-panes,ON,OFF}"

# -------------------------------------------------------------------
# Pane Management
# -------------------------------------------------------------------

# Split the current pane horizontally. (Default: <prefix> + ")
bind s split-window -h

# Split the current pane vertically. (Default: <prefix> + %)
bind v split-window -v

# Select the pane to the left. (Default: <prefix> + Left)
bind h select-pane -L

# Select the pane below. (Default: <prefix> + Down)
bind j select-pane -D

# Select the pane above. (Default: <prefix> + Up)
bind k select-pane -U

# Select the pane to the right. (Default: <prefix> + Right)
bind l select-pane -R

# Close the current pane. (Default: <prefix> + x)
bind x kill-pane

# -------------------------------------------------------------------
# Window Management
# -------------------------------------------------------------------

# Switch to the previous window. (Default: <prefix> + p)
bind -n C-h previous-window

# Switch to the next window. (Default: <prefix> + n)
bind -n C-l next-window

# Close the current window. (Default: <prefix> + &)
bind q kill-window

# -------------------------------------------------------------------
# Vim Copy Mode
# -------------------------------------------------------------------

# Use Vim keybindings in Copy Mode.
set -wg mode-keys vi

# Use Vim keybindings in Command Mode.
set -g status-keys vi

# Enter Copy Mode. (Default: <prefix> + [)
bind Enter copy-mode

# Begin text selection. (Default: Space)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy the selection and exit Copy Mode. (Default: Enter)
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Exit Copy Mode. (Default: q)
bind-key -T copy-mode-vi Escape send-keys -X cancel

# -------------------------------------------------------------------
# Plugin: catppuccin/tmux
# -------------------------------------------------------------------

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Make the status line pretty
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -ag status-right "#{E:@catppuccin_status_session}"

# -------------------------------------------------------------------
# Plugin: sainnhe/tmux-fzf
# -------------------------------------------------------------------

# Launch Key
TMUX_FZF_LAUNCH_KEY="C-f"

# -------------------------------------------------------------------
# Plugin: AngryMorrocoy/tmux-neolazygit
# -------------------------------------------------------------------

# Launch Key
set -g @open-lazygit 'G'

# -------------------------------------------------------------------
# Plugin Manager
# -------------------------------------------------------------------

# Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux#v2.3.0'

# Fuzzy finder
set -g @plugin 'sainnhe/tmux-fzf'

# Lazy Git Integration
set -g @plugin 'AngryMorrocoy/tmux-neolazygit'

# Initialize the plugins
run '~/.config/tmux/plugins/tpm/tpm'

